{% extends 'base.html' %}
{% block title %}{{ accion }} producto - Tienda Mass{% endblock %}
{% block content %}
<div class="container mx-auto p-6 max-w-lg">
    <h1 class="text-2xl font-bold mb-6">{{ accion }} producto</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {% for field in form %}
            <div class="mb-4">
                <label class="label">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <p class="text-error text-sm">{{ field.errors|join:", " }}</p>
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary w-full">Guardar</button>
    </form>
</div>
{% endblock %}
