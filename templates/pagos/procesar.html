{% extends 'base.html' %}
{% block title %}Pagar pedido - Tienda Mass{% endblock %}
{% block content %}
<div class="container mx-auto p-6 max-w-lg">
    <h1 class="text-2xl font-bold mb-4">Pagar pedido {{ pedido.numero_orden }}</h1>
    <p class="mb-4">Total: <span class="font-bold">S/ {{ pedido.total }}</span></p>

    <form method="post">
        {% csrf_token %}
        <label class="label">Selecciona método de pago</label>
        <select name="metodo" class="select select-bordered w-full mb-4" required>
            {% for valor, etiqueta in metodos %}
                <option value="{{ valor }}">{{ etiqueta }}</option>
            {% endfor %}
        </select>
        <button type="submit" class="btn btn-primary w-full">Pagar ahora</button>
    </form>
</div>
{% endblock %}
